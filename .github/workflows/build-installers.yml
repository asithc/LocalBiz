name: Build desktop installers

on:
  push:
    tags: ["v*"]          # e.g.  git tag v1.0.1 && git push --tags
  workflow_dispatch:       # manual trigger from Actions tab

permissions:
  contents: write          # needed to upload release assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_args: --win --x64
            artifact_glob: "release/*.exe"
          - os: macos-latest
            build_args: --mac --x64
            artifact_glob: "release/*.dmg"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Windows needs Python + Visual Studio build tools for node-gyp
      - name: Setup Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      # Compile TypeScript (renderer + main) BEFORE electron-builder packages
      - name: Build renderer + main
        run: npm run build

      # Now package — electron-builder will rebuild native modules for the target
      - name: Package installer
        run: npx electron-builder ${{ matrix.build_args }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          retention-days: 30

      - name: Attach to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
          draft: true
