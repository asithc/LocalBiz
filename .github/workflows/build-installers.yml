name: Build desktop installers

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_args: --win --x64
            artifact_glob: "release/*.exe"
          - os: macos-latest
            build_args: --mac --x64
            artifact_glob: "release/*.dmg"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main (TypeScript)
        run: npm run build

      - name: Package installer
        shell: bash
        run: |
          npx electron-builder ${{ matrix.build_args }} --publish never 2>&1 | tee build.log
          exit_code=${PIPESTATUS[0]}
          if [ $exit_code -ne 0 ]; then
            echo "::error::electron-builder failed. Last 80 lines of output:"
            tail -80 build.log
            exit $exit_code
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.os }}
          path: build.log
          retention-days: 7

      - name: List release output
        shell: bash
        run: ls -lh release/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          retention-days: 30

      - name: Attach to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
          draft: true
